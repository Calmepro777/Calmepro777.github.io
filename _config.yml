title: "[CSPHD] Premium ADA Stake Pool"
description: "Investment insights, Cardano education, and the case for decentralization — from a small stake pool operator."
url: "https://calmepro777.github.io"
baseurl: ""

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# SEO
author:
  name: "CSPHD"

# Blog settings
permalink: /blog/:year/:month/:title/
paginate: 10

# Exclude files from build
# NOTE: md.json and extended_metadata.json must NOT be excluded — they are the
# Cardano pool metadata files served at the on-chain-registered URLs
# (https://calmepro777.github.io/md.json + extended_metadata.json). Excluding
# them makes Jekyll drop them from the build → 404 → pool.pm/SMASH can't resolve
# the pool. They have no front matter, so Jekyll copies them verbatim (hash-safe).
exclude:
  - README.md
  - LICENSE

# Collections
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "CSPHD"
